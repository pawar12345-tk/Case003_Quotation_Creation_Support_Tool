<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>売上管理ポータル</title><style>
:root{--bg:#f4f7fb;--panel:#fff;--line:#cfd8e3;--primary:#2563eb;--head:#bfe2ea;--sub:#e5f6fa;--sec:#b9dde6;--pink:#f7dede;--danger:#dc2626;--ok:#059669;--muted:#667085}*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI","Meiryo",sans-serif;background:var(--bg);color:#1f2937}header{background:linear-gradient(135deg,#1d4ed8,#2563eb 60%,#60a5fa);color:#fff;padding:18px 24px}.hrow{display:flex;justify-content:space-between;align-items:flex-end}.title{font-size:24px;font-weight:700}.sub{font-size:12px;opacity:.9;margin-top:4px}.ver{font-size:12px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px;margin:12px 14px;box-shadow:0 1px 5px rgba(16,24,40,.06)}button{border:0;border-radius:9px;background:var(--primary);color:#fff;padding:9px 13px;font-weight:700;cursor:pointer}button.ghost{background:#eef2ff;color:#1d4ed8;border:1px solid #c7d2fe}button.secondary{background:#475569}button:disabled{background:#cbd5e1}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.status{margin-left:auto;font-size:12px;color:var(--muted)}.grid{display:grid;grid-template-columns:1.7fr repeat(8,minmax(115px,.8fr));gap:9px;align-items:end}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}.field input,.field select{height:36px;width:100%;border:1px solid var(--line);border-radius:9px;padding:6px 9px}.tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:10px;flex-wrap:wrap}.tab{background:#f8fafc;color:#334155;border:1px solid var(--line);border-bottom:0;border-radius:10px 10px 0 0}.tab.active{background:#e5edff;color:#1d4ed8}.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}.card{border:1px solid var(--line);border-radius:12px;padding:10px;background:linear-gradient(180deg,#fff,#f8fafc)}.lab{font-size:12px;color:var(--muted)}.val{font-size:20px;font-weight:800;margin-top:3px}.note,.hint{font-size:11px;color:var(--muted)}.positive{color:var(--ok)}.negative{color:var(--danger)}.neutral{color:#334155}.chip{display:inline-flex;background:#f1f5f9;border:1px solid var(--line);border-radius:999px;padding:4px 8px;margin-right:5px;margin-top:7px;font-size:12px;color:#475569}.manual{display:none;border-top:1px dashed var(--line);margin-top:10px;padding-top:10px}.manual.open{display:block}.manual-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.table-tools{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.tablebox{overflow:auto;border:1px solid var(--line);border-radius:12px;background:#fff;max-height:66vh}.tbl{border-collapse:separate;border-spacing:0;width:100%;min-width:1500px;font-size:12px}.tbl th,.tbl td{border-right:1px solid #8aa2ad;border-bottom:1px dotted #8aa2ad;padding:5px 7px;white-space:nowrap}.tbl th{position:sticky;top:0;z-index:2;background:var(--head);text-align:center;font-weight:800}.tbl thead tr:nth-child(2) th{top:28px;background:var(--sub)}.name{min-width:240px;max-width:360px;overflow:hidden;text-overflow:ellipsis}.num{text-align:right;font-variant-numeric:tabular-nums}.total{background:#eef8fb!important;font-weight:800}.section td{background:var(--sec)!important;font-weight:800}.section.pink td{background:var(--pink)!important}.diff{background:#f7fbfd}.collapsible.collapsed{height:8px;padding:0;margin-top:8px;overflow:hidden;opacity:.16;transition:.15s}.collapsible.collapsed:hover{height:auto;padding:13px;opacity:1}.period{display:none}.period.show{display:flex}@media(max-width:1400px){.grid{grid-template-columns:1fr 1fr 1fr}.cards{grid-template-columns:1fr 1fr 1fr}}@media(max-width:900px){.grid,.cards,.manual-grid{grid-template-columns:1fr}.status{margin-left:0}}
</style></head><body><header><div class="hrow"><div><div class="title">売上管理ポータル</div><div class="sub">今回・前回・予算の最新CSVを読込み、原価元帳確認／差異確認／月別_グループ計を表示します。</div></div><div class="ver">v1.5</div></div></header>
<section id="operationPanel" class="panel"><div class="row"><button id="folderBtn">作業フォルダ選択</button><button id="manualToggle" class="ghost">手動読込</button><button id="resetBtn" class="ghost" disabled>条件クリア</button><button id="exportBtn" class="secondary" disabled>表示一覧CSV出力</button><span id="status" class="status">作業フォルダを選択してください。</span></div><div id="manual" class="manual"><div class="manual-grid"><div class="field"><label>今回見通し CSV</label><input id="fCur" type="file" accept=".csv"></div><div class="field"><label>前回見通し CSV</label><input id="fPre" type="file" accept=".csv"></div><div class="field"><label>予算 CSV</label><input id="fBud" type="file" accept=".csv"></div></div><div class="row" style="margin-top:8px"><button id="manualLoad" class="secondary">手動ファイルを読込</button></div></div></section>
<section id="filterPanel" class="panel collapsible"><div class="grid"><div class="field"><label>PJ名／PJコード検索</label><input id="q" list="hist" placeholder="クリックで履歴表示" disabled><datalist id="hist"></datalist></div><div class="field"><label>集計項目</label><select id="metric" disabled></select></div><div class="field"><label>年度</label><select id="fy" disabled><option value="all">すべて</option></select></div><div class="field"><label>チーム</label><select id="team" disabled><option value="all">すべて</option></select></div><div class="field"><label>スポット／ストック</label><select id="stock" disabled><option value="all">すべて</option></select></div><div class="field"><label>受注ランク</label><select id="rank" disabled><option value="all">すべて</option></select></div><div class="field"><label>取引先</label><select id="cust" disabled><option value="all">すべて</option></select></div><div class="field"><label>PJ期間 開始</label><input id="pjs" type="date" disabled></div><div class="field"><label>PJ期間 終了</label><input id="pje" type="date" disabled></div></div><div id="chips"></div></section>
<section class="panel"><div class="tabs"><button class="tab active" data-tab="current">今回</button><button class="tab" data-tab="diff">前回差異</button><button class="tab" data-tab="budget">予算</button><button class="tab" data-tab="alerts">自動抽出</button><button class="tab" data-tab="groupMonthly">月別_グループ計</button></div><div id="period" class="row period"><span class="hint">表示期間：</span><label><input type="radio" name="period" value="upper" checked> 上期</label><label><input type="radio" name="period" value="lower"> 下期</label><label><input type="radio" name="period" value="all"> 通期</label></div></section>
<section id="summaryPanel" class="panel collapsible"><div class="cards"><div class="card"><div class="lab">読込状況</div><div id="loaded" class="val" style="font-size:14px">-</div><div id="files" class="note">-</div></div><div class="card"><div class="lab">表示明細</div><div id="rows" class="val">-</div><div class="note">フィルタ後</div></div><div class="card"><div class="lab">表示件数</div><div id="projects" class="val">-</div><div class="note">PJ／グループ項目</div></div><div class="card"><div class="lab">年月数</div><div id="months" class="val">-</div><div class="note">横持ち列</div></div><div class="card"><div class="lab">表示合計</div><div id="total" class="val">-</div><div class="note">選択タブ・項目</div></div><div class="card"><div class="lab">警告件数</div><div id="alerts" class="val">-</div><div class="note">赤字・悪化等</div></div></div></section>
<section class="panel"><div class="table-tools"><div><b id="tableTitle">集計一覧</b></div><div class="hint">月別_グループ計は選択期間のみ描画します。</div></div><div class="tablebox"><table id="tbl" class="tbl"><thead></thead><tbody></tbody></table></div></section>
<script>
const E=id=>document.getElementById(id);const state={data:{current:[],previous:[],budget:[]},headers:[],tab:'current',metric:'営業利益',months:[],pivot:[],rows:[],files:{},hist:JSON.parse(localStorage.getItem('salesPortalSearchHistory')||'[]'),cache:null};
const labels={current:'今回',diff:'前回差異',budget:'予算',alerts:'自動抽出',groupMonthly:'月別_グループ計'};const folders={current:'今回見通し',previous:'前回見通し',budget:'予算'};
const itemOrder=['売上計','部門売上','進行基準売上','内部売上','内部進行基準売上','その他売上','ネット売上','売上原価(原価）','売上原価(原価)','人件費（原価+販管）','外注費計(原価+販管）','外注費（一括外注費）','請負外注費','準委任外注費','派遣外注費','外注費（引入外注費）','経費(原価+販管）','機械費','機械費(他XaaS仕入)','保守料','減価償却費','家賃地代','設備費','電力費','通信回線使用料','備品消耗品費','旅費交通費','海外出張費','広告宣伝費','交際接待費','会議費','寄付金','教育費','求人採用費','支払手数料','租税公課等','その他経費','経費(費用振替)（原価+販管）','振替労務費','振替DC利用料（機械）','振替DC利用料（設備）','振替DC利用料（回線）','振替施設費','振替インフラ費','振替その他経費','振替サービス型共通費','費用移管','内部仕入計','内部仕入','仕入原価','原価差額','製造間接費','仕掛残','期首仕掛残','期末仕掛残','ソフ仮残','期首ソフ仮残','期末ソフ仮残','他勘定振替','ソフトウェア資産','その他調整額','受注損失引当金','繰入','繰戻','売上総利益(GAIA)','販売費','販売費(発生額)','部門販売費','一般管理費','一般管理費(発生額)','部門一般管理費','売上総利益(TITAN)','販管費配賦','事業部配賦','事業本部配賦','統括本部配賦','事業貢献利益','本社配賦','営業利益'];
const sectionSet=new Set(['売上計','ネット売上','売上原価(原価）','売上原価(原価)','経費(原価+販管）','経費(費用振替)（原価+販管）','費用移管','内部仕入計','原価差額','製造間接費','仕掛残','ソフ仮残','他勘定振替','受注損失引当金','売上総利益(GAIA)','一般管理費','売上総利益(TITAN)','販管費配賦','事業貢献利益','本社配賦','営業利益']);const pinkSet=new Set(['ネット売上','売上原価(原価）','売上原価(原価)','売上総利益(TITAN)','販管費配賦','事業貢献利益','営業利益']);
function norm(s){return String(s??'').replace(/^\uFEFF/,'').trim()}function cleanName(s){return norm(s).replace(/^[\s　]+/,'')}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function num(v){const s=String(v??'').replace(/,/g,'').replace(/"/g,'').trim();if(!s||s==='-')return 0;const n=Number(s);return Number.isFinite(n)?n:0}function fmt(n){return Number(n||0).toLocaleString('ja-JP')}function cls(n){return Number(n)<0?'negative':Number(n)>0?'positive':'neutral'}
function fyOf(ym){const s=String(ym);if(!/^\d{6}$/.test(s))return'';const y=+s.slice(0,4),m=+s.slice(4,6);return String(m>=4?y:y-1)}function ymd(iso){return iso?Number(iso.replaceAll('-','')):null}function team(r){const v=norm(r['分析テキスト８']);if(!v)return'該当なし';return /^\d+$/.test(v)?v+'G':v}function stock(r){return norm(r['分析コード５名'])||norm(r['分析コード５'])||'該当なし'}function rank(r){return norm(r['受注ランク'])||'該当なし'}function cust(r){return norm(r['取引先名'])||'該当なし'}
function parseCSV(t){const rows=[];let row=[],cur='',q=false;for(let i=0;i<t.length;i++){const c=t[i],n=t[i+1];if(q){if(c==='"'&&n==='"'){cur+='"';i++}else if(c==='"')q=false;else cur+=c}else{if(c==='"')q=true;else if(c===','){row.push(cur);cur=''}else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur=''}else if(c==='\r'){}else cur+=c}}if(cur!==''||row.length){row.push(cur);rows.push(row)}return rows.filter(r=>r.some(x=>norm(x)))}
async function readText(file){const buf=await file.arrayBuffer();let t=new TextDecoder('shift_jis').decode(buf);if(!t.includes('プロジェクトコード'))t=new TextDecoder('utf-8').decode(buf);return t}function toRows(t){const m=parseCSV(t);if(!m.length)return[];const h=m[0].map(norm);for(const c of ['年月','プロジェクトコード','プロジェクト名'])if(!h.includes(c))throw new Error('必須列不足: '+c);if(!state.headers.length)state.headers=h;return m.slice(1).map(r=>{const o={};h.forEach((x,i)=>o[x]=r[i]??'');return o})}
async function load(kind,file){if(!file)return;state.data[kind]=toRows(await readText(file));state.files[kind]=file.name;state.cache=null}async function latestCsv(dir){let latest=null;for await(const [name,h]of dir.entries()){if(h.kind==='file'&&/\.csv$/i.test(name)){const f=await h.getFile();if(!latest||f.lastModified>latest.lastModified)latest=f}}if(!latest)throw new Error('CSVファイルがありません');return latest}
async function loadFolder(){if(!window.showDirectoryPicker){alert('このブラウザでは作業フォルダ選択に対応していません。手動読込を利用してください。');E('manual').classList.add('open');return}try{E('status').textContent='読込中...';const root=await window.showDirectoryPicker();for(const k of ['current','previous','budget']){const d=await root.getDirectoryHandle(folders[k]);await load(k,await latestCsv(d))}afterLoad()}catch(e){console.error(e);alert('読込に失敗しました。\n'+e.message);E('status').textContent='読込失敗'}}async function loadManual(){try{await load('current',E('fCur').files[0]);await load('previous',E('fPre').files[0]);await load('budget',E('fBud').files[0]);afterLoad()}catch(e){alert(e.message)}}
function uniq(fn){const s=new Set();Object.values(state.data).flat().forEach(r=>{const v=fn(r);if(v)s.add(v)});return [...s].sort((a,b)=>String(a).localeCompare(String(b),'ja'))}function opts(el,vals){el.innerHTML='<option value="all">すべて</option>';vals.forEach(v=>el.add(new Option(v,v)))}
function metricColumnMap(){const m=new Map();state.headers.forEach(h=>m.set(cleanName(h),h));return m}function availableMetrics(){const mp=metricColumnMap();return itemOrder.filter(x=>mp.has(x))}
function afterLoad(){const metrics=availableMetrics();E('metric').innerHTML='';metrics.forEach(m=>E('metric').add(new Option(m,m)));if([...E('metric').options].some(o=>o.value==='営業利益'))E('metric').value='営業利益';state.metric=E('metric').value;opts(E('fy'),uniq(r=>fyOf(r['年月'])));opts(E('team'),uniq(team));opts(E('stock'),uniq(stock));opts(E('rank'),uniq(rank));opts(E('cust'),uniq(cust));updateHist();['q','metric','fy','team','stock','rank','cust','pjs','pje','resetBtn','exportBtn'].forEach(id=>E(id).disabled=false);E('loaded').textContent=new Date().toLocaleString('ja-JP');E('files').textContent=`今回:${state.files.current||'-'} / 前回:${state.files.previous||'-'} / 予算:${state.files.budget||'-'}`;E('status').textContent='読込完了';E('filterPanel').classList.add('collapsed');E('summaryPanel').classList.add('collapsed');apply()}
function updateHist(){const pj=uniq(r=>norm(r['プロジェクト名'])).slice(0,300);E('hist').innerHTML=[...new Set([...state.hist,...pj])].map(v=>`<option value="${esc(v)}"></option>`).join('')}function saveHist(){const q=norm(E('q').value);if(!q)return;state.hist=[q,...state.hist.filter(x=>x!==q)].slice(0,30);localStorage.setItem('salesPortalSearchHistory',JSON.stringify(state.hist));updateHist()}
function filtered(base){const q=norm(E('q').value).toLowerCase(),fs=ymd(E('pjs').value),fe=ymd(E('pje').value);return base.filter(r=>{const ps=Number(norm(r['PJ開始日']).replace(/\D/g,''))||0,pe=Number(norm(r['PJ終了日']).replace(/\D/g,''))||99999999;return(E('fy').value==='all'||fyOf(r['年月'])===E('fy').value)&&(E('team').value==='all'||team(r)===E('team').value)&&(E('stock').value==='all'||stock(r)===E('stock').value)&&(E('rank').value==='all'||rank(r)===E('rank').value)&&(E('cust').value==='all'||cust(r)===E('cust').value)&&(!q||(norm(r['プロジェクト名'])+' '+norm(r['プロジェクトコード'])).toLowerCase().includes(q))&&(!fs||pe>=fs)&&(!fe||ps<=fe)})}
function getVal(r,metric,mp=metricColumnMap()){return num(r[mp.get(metric)||metric])}function aggregate(rows){const mp=metricColumnMap(),months=[...new Set(rows.map(r=>norm(r['年月'])).filter(Boolean))].sort(),map=new Map();for(const r of rows){const code=norm(r['プロジェクトコード']),name=norm(r['プロジェクト名']),key=code+'\t'+name;if(!map.has(key))map.set(key,{code,name,months:{},total:0,details:[]});const it=map.get(key),m=norm(r['年月']),v=getVal(r,state.metric,mp);it.months[m]=(it.months[m]||0)+v;it.total+=v;it.details.push(r)}return{months,pivot:[...map.values()].sort((a,b)=>Math.abs(b.total)-Math.abs(a.total))}}
function diff(cur,pre){const c=aggregate(cur),p=aggregate(pre),months=[...new Set([...c.months,...p.months])].sort(),keys=new Set([...c.pivot,...p.pivot].map(x=>x.code+'\t'+x.name));const cm=new Map(c.pivot.map(x=>[x.code+'\t'+x.name,x])),pm=new Map(p.pivot.map(x=>[x.code+'\t'+x.name,x]));return{months,pivot:[...keys].map(k=>{const a=cm.get(k)||{},b=pm.get(k)||{},o={code:a.code||b.code,name:a.name||b.name,months:{},total:(a.total||0)-(b.total||0),details:a.details||b.details||[]};months.forEach(m=>o.months[m]=(a.months?.[m]||0)-(b.months?.[m]||0));return o}).sort((a,b)=>Math.abs(b.total)-Math.abs(a.total))}}
function chooseFY(){if(E('fy').value!=='all')return Number(E('fy').value);const yrs=[...new Set([...state.data.current,...state.data.previous,...state.data.budget].map(r=>fyOf(r['年月'])).filter(Boolean))].sort();return Number(yrs[0]||new Date().getFullYear())}function allFYMonths(y){return [`${y}04`,`${y}05`,`${y}06`,`${y}07`,`${y}08`,`${y}09`,`${y}10`,`${y}11`,`${y}12`,`${y+1}01`,`${y+1}02`,`${y+1}03`]}function selectedMonths(){const y=chooseFY(),p=document.querySelector('input[name="period"]:checked')?.value||'upper',all=allFYMonths(y);if(p==='upper')return{months:all.slice(0,6),total:'上期計'};if(p==='lower')return{months:all.slice(6,12),total:'下期計'};return{months:all,total:'通期計'}}function unitDiv(){const all=[...state.data.current,...state.data.previous,...state.data.budget],mp=metricColumnMap();const t=all.slice(0,5000).reduce((s,r)=>s+Math.abs(getVal(r,'営業利益',mp)),0);return t>10000?1000000:1}function fm(n){return (Number(n||0)/unitDiv()).toLocaleString('ja-JP',{minimumFractionDigits:1,maximumFractionDigits:1})}
function buildGroupCache(){const mp=metricColumnMap(),metrics=availableMetrics(),rows={current:filtered(state.data.current),previous:filtered(state.data.previous),budget:filtered(state.data.budget)};function ag(rs){const map=new Map();for(const r of rs){const g=team(r),mo=norm(r['年月']);for(const met of metrics){const v=getVal(r,met,mp);if(!v)continue;const key=g+' -- '+met;if(!map.has(key))map.set(key,{group:g,item:met,vals:{}});const vals=map.get(key).vals;vals[mo]=(vals[mo]||0)+v}}return map}state.cache={metrics,cur:ag(rows.current),pre:ag(rows.previous),bud:ag(rows.budget),rowCount:rows.current.length}}
function groupMonthly(){buildGroupCache();const {months,total}=selectedMonths(),keys=new Set([...state.cache.cur.keys(),...state.cache.pre.keys(),...state.cache.bud.keys()]);const metrics=state.cache.metrics;const arr=[...keys].map(k=>state.cache.cur.get(k)||state.cache.pre.get(k)||state.cache.bud.get(k)).sort((a,b)=>{const gn=g=>{const x=String(g).match(/^(\d+)/);return x?Number(x[1]):999};return gn(a.group)!==gn(b.group)?gn(a.group)-gn(b.group):metrics.indexOf(a.item)-metrics.indexOf(b.item)});const pivot=[];for(const base of arr){const k=base.group+' -- '+base.item,c=state.cache.cur.get(k)||{vals:{}},p=state.cache.pre.get(k)||{vals:{}},b=state.cache.bud.get(k)||{vals:{}},vals={};for(const mo of months){const cv=c.vals[mo]||0,pv=p.vals[mo]||0,bv=b.vals[mo]||0;vals[mo]={budget:bv,previous:pv,current:cv,budgetDiff:cv-bv,previousDiff:cv-pv}}const sum=key=>months.reduce((s,mo)=>s+(vals[mo]?.[key]||0),0);vals[total]={budget:sum('budget'),previous:sum('previous'),current:sum('current'),budgetDiff:sum('budgetDiff'),previousDiff:sum('previousDiff')};if(Object.values(vals).some(v=>v.budget||v.previous||v.current))pivot.push({group:base.group,item:base.item,vals,total:vals[total].current})}return{title:'月別_グループ計',months:[...months,total],pivot,rows:{length:state.cache.rowCount},isGroup:true}}
function alerts(c,p){const cur=aggregate(c),di=diff(c,p);return{title:'自動抽出',months:di.months,rows:c,isAlerts:true,pivot:[...di.pivot.slice(0,20).map(x=>({...x,alertType:'差異上位'})),...cur.pivot.filter(x=>x.total<0).slice(0,20).map(x=>({...x,alertType:'赤字案件'})),...di.pivot.filter(x=>x.total<0).slice(0,20).map(x=>({...x,alertType:'前回比大幅悪化'}))]}}
function view(){state.metric=E('metric').value||state.metric;const c=filtered(state.data.current),p=filtered(state.data.previous),b=filtered(state.data.budget);if(state.tab==='current')return{...aggregate(c),rows:c,title:'今回'};if(state.tab==='budget')return{...aggregate(b),rows:b,title:'予算'};if(state.tab==='diff')return{...diff(c,p),rows:c,title:'前回差異'};if(state.tab==='groupMonthly')return groupMonthly();return alerts(c,p)}function apply(){const v=view();state.months=v.months;state.pivot=v.pivot;state.rows=v.rows;cards();chips();render(v)}
function cards(){E('rows').textContent=(state.rows.length||0).toLocaleString('ja-JP');E('projects').textContent=(state.pivot.length||0).toLocaleString('ja-JP');E('months').textContent=(state.months.length||0).toLocaleString('ja-JP');const t=state.pivot.reduce((s,r)=>s+(r.total||0),0);E('total').textContent=fmt(t);E('total').className='val '+cls(t);E('alerts').textContent=alerts(filtered(state.data.current),filtered(state.data.previous)).pivot.length.toLocaleString('ja-JP')}function chips(){const items=[['タブ',labels[state.tab]],['項目',state.metric],['年度',E('fy').value],['チーム',E('team').value],['期間',document.querySelector('input[name="period"]:checked')?.parentElement?.textContent.trim()||''],['区分',E('stock').value],['ランク',E('rank').value],['取引先',E('cust').value]].filter(x=>x[1]&&x[1]!=='all');E('chips').innerHTML=items.map(x=>`<span class="chip">${esc(x[0])}: ${esc(x[1])}</span>`).join('')}
function render(v){if(v.isGroup)return renderGroup(v);E('tableTitle').textContent=v.title+' 一覧';const th=E('tbl').querySelector('thead'),tb=E('tbl').querySelector('tbody'),ah=v.isAlerts?'<th>抽出区分</th>':'';th.innerHTML='<tr>'+ah+'<th>プロジェクト名</th><th>PJコード</th>'+v.months.map(m=>`<th>${m}</th>`).join('')+'<th class="total">総計</th></tr>';tb.innerHTML=v.pivot.map(r=>`<tr>${v.isAlerts?`<td>${esc(r.alertType)}</td>`:''}<td class="name" title="${esc(r.name)}">${esc(r.name)}</td><td>${esc(r.code)}</td>`+v.months.map(m=>`<td class="num ${cls(r.months[m])}">${fmt(r.months[m])}</td>`).join('')+`<td class="num total ${cls(r.total)}">${fmt(r.total)}</td></tr>`).join('')||'<tr><td colspan="99">表示対象がありません。</td></tr>'}
function renderGroup(v){E('tableTitle').textContent='月別_グループ計';const th=E('tbl').querySelector('thead'),tb=E('tbl').querySelector('tbody');th.innerHTML='<tr><th rowspan="2">グループ</th><th rowspan="2">項目</th>'+v.months.map(m=>`<th colspan="5">${esc(m)}</th>`).join('')+'</tr><tr>'+v.months.map(()=>'<th>予算</th><th>前回</th><th>今回</th><th class="diff">予算比</th><th class="diff">前回比</th>').join('')+'</tr>';tb.innerHTML=v.pivot.map(r=>{const cn=cleanName(r.item),sec=sectionSet.has(cn),pink=pinkSet.has(cn);return `<tr class="${sec?'section':''} ${pink?'pink':''}"><td>${esc(r.group)}</td><td class="name">${esc(cn)}</td>`+v.months.map(m=>{const x=r.vals[m]||{};return `<td class="num">${fm(x.budget)}</td><td class="num">${fm(x.previous)}</td><td class="num">${fm(x.current)}</td><td class="num diff ${cls(x.budgetDiff)}">${fm(x.budgetDiff)}</td><td class="num diff ${cls(x.previousDiff)}">${fm(x.previousDiff)}</td>`}).join('')+'</tr>'}).join('')||'<tr><td colspan="99">表示対象がありません。</td></tr>'}
function exportCsv(){const v=view();let lines;if(v.isGroup){const heads=['グループ','項目'];v.months.forEach(m=>heads.push(`${m}_予算(M)`,`${m}_前回(M)`,`${m}_今回(M)`,`${m}_予算比(M)`,`${m}_前回比(M)`));lines=[heads,...v.pivot.map(r=>{const row=[r.group,cleanName(r.item)];v.months.forEach(m=>{const x=r.vals[m]||{};row.push(fm(x.budget),fm(x.previous),fm(x.current),fm(x.budgetDiff),fm(x.previousDiff))});return row})]}else{lines=[[(v.isAlerts?'抽出区分,':'')+'プロジェクト名','PJコード',...v.months,'総計'],...v.pivot.map(r=>[...(v.isAlerts?[r.alertType]:[]),r.name,r.code,...v.months.map(m=>r.months[m]||0),r.total])]}const csv=lines.map(r=>r.map(x=>'"'+String(x??'').replace(/"/g,'""')+'"').join(',')).join('\r\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download=`売上管理_${labels[state.tab]}_${new Date().toISOString().slice(0,10).replaceAll('-','')}.csv`;a.click();URL.revokeObjectURL(a.href)}
E('folderBtn').onclick=loadFolder;E('manualToggle').onclick=()=>E('manual').classList.toggle('open');E('manualLoad').onclick=loadManual;E('exportBtn').onclick=exportCsv;E('resetBtn').onclick=()=>{['fy','team','stock','rank','cust'].forEach(id=>E(id).value='all');['q','pjs','pje'].forEach(id=>E(id).value='');state.cache=null;apply()};['metric','fy','team','stock','rank','cust','pjs','pje'].forEach(id=>E(id).onchange=()=>{state.cache=null;apply()});document.querySelectorAll('input[name="period"]').forEach(r=>r.onchange=apply);E('q').oninput=()=>{state.cache=null;clearTimeout(window.t);window.t=setTimeout(apply,150)};E('q').onblur=saveHist;document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');state.tab=b.dataset.tab;E('period').classList.toggle('show',state.tab==='groupMonthly');apply()});
</script></body></html>
